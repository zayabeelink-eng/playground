<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1942 Arcade Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #gameContainer {
            position: relative;
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0, 100, 255, 0.3);
        }

        #gameContainer.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            box-shadow: none;
            z-index: 9999;
        }

        #gameCanvas {
            display: block;
            background: #001a33;
        }

        #gameContainer.fullscreen #gameCanvas {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }

        #gameContainer.fullscreen #scanlines {
            width: 100vw;
            height: 100vh;
        }

        #fsButton,
        #muteButton {
            position: fixed;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid #555;
            padding: 6px 12px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            cursor: pointer;
            z-index: 10000;
            border-radius: 3px;
        }

        #fsButton {
            bottom: 10px;
            right: 10px;
        }

        #muteButton {
            bottom: 10px;
            right: 130px;
        }

        #fsButton:hover,
        #muteButton:hover {
            background: rgba(50, 50, 50, 0.8);
        }

        #gameContainer.fullscreen ~ #fsButton {
            bottom: 20px;
            right: 20px;
            font-size: 16px;
        }

        #gameContainer.fullscreen ~ #muteButton {
            bottom: 20px;
            right: 150px;
            font-size: 16px;
        }

        #scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.1) 2px,
                rgba(0, 0, 0, 0.1) 4px
            );
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="450" height="600"></canvas>
        <div id="scanlines"></div>
    </div>
    <button id="fsButton">[F] Fullscreen</button>
    <button id="muteButton">[M] Mute</button>

    <script>
    'use strict';

    // ============================================================
    //  CONSTANTS & CONFIGURATION
    // ============================================================
    const CANVAS_W = 450;
    const CANVAS_H = 600;
    const FPS = 60;
    const FRAME_DT = 1000 / FPS;

    const PLAYER_SPEED = 5;
    const PLAYER_WIDTH = 36;
    const PLAYER_HEIGHT = 40;
    const PLAYER_LIVES = 3;
    const PLAYER_LOOP_COUNT = 3;
    const PLAYER_LOOP_DURATION = 90; // frames (~1.5s at 60fps)
    const PLAYER_SHOOT_COOLDOWN = 8;

    const BULLET_SPEED = 10;
    const BULLET_WIDTH = 4;
    const BULLET_HEIGHT = 12;

    const ENEMY_FIGHTER_SPEED = 2.5;
    const ENEMY_FIGHTER_HP = 1;
    const ENEMY_FIGHTER_SIZE = 28;
    const ENEMY_FIGHTER_SCORE = 100;

    const ENEMY_BOMBER_SPEED = 1.5;
    const ENEMY_BOMBER_HP = 5;
    const ENEMY_BOMBER_SIZE = 48;
    const ENEMY_BOMBER_SCORE = 500;

    const ENEMY_BULLET_SPEED = 4;
    const ENEMY_BULLET_SIZE = 4;

    const SPAWN_INTERVAL_BASE = 180; // frames
    const DIFFICULTY_SCALE = 0.98; // multiplier per 1000 score

    // Weapon upgrade constants
    const WEAPON_NORMAL = 0;
    const WEAPON_SPREAD = 1;   // 3-way shot
    const WEAPON_LASER = 2;    // fast piercing beam
    const WEAPON_MISSILE = 3;  // homing missiles
    const WEAPON_DOUBLE = 4;   // dual wide shot

    const POWERUP_TYPES = ['spread', 'laser', 'missile', 'double', 'life'];
    const POWERUP_COLORS = { spread: '#f80', laser: '#0ff', missile: '#f0f', double: '#ff0', life: '#0f0' };
    const POWERUP_CHANCE = 0.15; // 15% chance per kill
    const POWERUP_LASER_CHANCE = 0.08; // 8% chance for laser
    const POWERUP_MISSILE_CHANCE = 0.06; // 6% chance for missile
    const POWERUP_DOUBLE_CHANCE = 0.10; // 10% chance for double
    const POWERUP_LIFE_CHANCE = 0.03; // 3% chance for extra life

    // Combo system constants
    const COMBO_WINDOW = 120; // frames (2 seconds at 60fps) to chain kills
    const COMBO_MAX = 20; // maximum combo count
    const COMBO_SCORE_MULTIPLIER_BASE = 1;
    const COMBO_SCORE_MULTIPLIER_PER_LEVEL = 0.1; // +10% per combo level
    const COMBO_CRITICAL_CHANCE = 0.15; // 15% chance at max combo for 3x score

    // Phase progression constants
    const PHASES = [
        { minScore: 0,      name: 'PACIFIC OCEAN',  bgTop: '#001a33', bgMid: '#002244', bgBottom: '#001a33', bossType: 'carrier', bossScore: 5000 },
        { minScore: 5000,   name: 'SUNSET SKIES',   bgTop: '#1a0a33', bgMid: '#441a33', bgBottom: '#1a0a33', bossType: 'gunship', bossScore: 10000 },
        { minScore: 15000,  name: 'STORM FRONT',    bgTop: '#0a0a1a', bgMid: '#1a1a33', bgBottom: '#0a0a1a', bossType: 'carrier_mk2', bossScore: 15000 },
        { minScore: 30000,  name: 'FINAL BATTLE',   bgTop: '#1a0000', bgMid: '#330000', bgBottom: '#1a0000', bossType: 'final', bossScore: 20000 },
    ];

    // Enemy Mk2 constants (faster, harder variants)
    const ENEMY_FIGHTER_MK2_SPEED = 3.5;
    const ENEMY_FIGHTER_MK2_HP = 2;
    const ENEMY_FIGHTER_MK2_SIZE = 24;
    const ENEMY_FIGHTER_MK2_SCORE = 200;

    const ENEMY_ELITE_SPEED = 4;
    const ENEMY_ELITE_HP = 3;
    const ENEMY_ELITE_SIZE = 30;
    const ENEMY_ELITE_SCORE = 400;

    const BOSS_GUNSHIP_SCORE = 8000;
    const BOSS_CARRIER_MK2_SCORE = 12000;
    const BOSS_FINAL_SCORE = 20000;

    // ============================================================
    //  CANVAS SETUP
    // ============================================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ============================================================
    //  INPUT HANDLING
    // ============================================================
    class InputHandler {
        constructor() {
            this.keys = {};
            this.justPressed = {};

            window.addEventListener('keydown', (e) => {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space', ' ', 'KeyW', 'KeyA', 'KeyS', 'KeyD', 'KeyB', 'KeyX', 'KeyF', 'KeyM'].includes(e.code)) {
                    e.preventDefault();
                }
                if (e.code === 'KeyF' && !this.keys['KeyF']) {
                    toggleFullscreen();
                }
                if (e.code === 'KeyM' && !this.keys['KeyM']) {
                    audio.toggleMute();
                }
                if (!this.keys[e.code]) {
                    this.justPressed[e.code] = true;
                }
                this.keys[e.code] = true;
            });

            window.addEventListener('keyup', (e) => {
                this.keys[e.code] = false;
            });
        }

        isDown(code) {
            return !!this.keys[code];
        }

        wasPressed(code) {
            return !!this.justPressed[code];
        }

        clearJustPressed() {
            this.justPressed = {};
        }
    }

    const input = new InputHandler();

    // ============================================================
    //  FULLSCREEN TOGGLE
    // ============================================================
    const gameContainer = document.getElementById('gameContainer');
    const fsButton = document.getElementById('fsButton');

    function toggleFullscreen() {
        const isFS = gameContainer.classList.contains('fullscreen');
        if (isFS) {
            gameContainer.classList.remove('fullscreen');
            fsButton.textContent = '[F] Fullscreen';
        } else {
            gameContainer.classList.add('fullscreen');
            fsButton.textContent = '[F] Exit FS';
        }
    }

    fsButton.addEventListener('click', toggleFullscreen);

    const muteButton = document.getElementById('muteButton');
    muteButton.addEventListener('click', () => audio.toggleMute());

    // ============================================================
    //  AUDIO SYNTHESIS (Web Audio API)
    // ============================================================
    class AudioSynth {
        constructor() {
            this.ctx = null;
            this.enabled = false;
            this.muted = false;
        }

        init() {
            if (this.ctx) return;
            try {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.enabled = true;
            } catch (e) {
                this.enabled = false;
            }
        }

        toggleMute() {
            this.muted = !this.muted;
            const btn = document.getElementById('muteButton');
            btn.textContent = this.muted ? '[M] Unmute' : '[M] Mute';
            return this.muted;
        }

        play(type) {
            if (!this.enabled || !this.ctx || this.muted) return;
            try {
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                switch (type) {
                    case 'shoot':
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(880, now);
                        osc.frequency.exponentialRampToValueAtTime(440, now + 0.05);
                        gain.gain.setValueAtTime(0.08, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                        osc.start(now);
                        osc.stop(now + 0.05);
                        break;
                    case 'explosion':
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(200, now);
                        osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
                        gain.gain.setValueAtTime(0.12, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                        osc.start(now);
                        osc.stop(now + 0.2);
                        break;
                    case 'loop':
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(300, now);
                        osc.frequency.linearRampToValueAtTime(900, now + 0.3);
                        osc.frequency.linearRampToValueAtTime(300, now + 0.6);
                        gain.gain.setValueAtTime(0.06, now);
                        gain.gain.linearRampToValueAtTime(0.001, now + 0.6);
                        osc.start(now);
                        osc.stop(now + 0.6);
                        break;
                    case 'hit':
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(600, now);
                        osc.frequency.exponentialRampToValueAtTime(200, now + 0.08);
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                        osc.start(now);
                        osc.stop(now + 0.08);
                        break;
                }
            } catch (e) { /* silence */ }
        }
    }

    const audio = new AudioSynth();

    // ============================================================
    //  BACKGROUND RENDERING
    // ============================================================
    class Background {
        constructor() {
            this.scrollY = 0;
            this.waves = [];
            this.islands = [];
            this.phaseIndex = 0;
            this.generateIslands();
        }

        setPhase(phaseIndex) {
            this.phaseIndex = phaseIndex;
        }

        getPhaseColors() {
            const p = PHASES[this.phaseIndex] || PHASES[0];
            return { top: p.bgTop, mid: p.bgMid, bottom: p.bgBottom };
        }

        generateIslands() {
            for (let i = 0; i < 15; i++) {
                this.islands.push({
                    x: Math.random() * CANVAS_W,
                    y: Math.random() * CANVAS_H * 3,
                    radius: 15 + Math.random() * 35,
                    color: `hsl(${100 + Math.random() * 40}, ${40 + Math.random() * 30}%, ${25 + Math.random() * 20}%)`,
                    detail: Math.random()
                });
            }
        }

        update() {
            this.scrollY += 1.5;
            if (this.scrollY > CANVAS_H) {
                this.scrollY -= CANVAS_H;
            }
        }

        draw(ctx) {
            const colors = this.getPhaseColors();
            // Ocean gradient
            const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
            grad.addColorStop(0, colors.top);
            grad.addColorStop(0.5, colors.mid);
            grad.addColorStop(1, colors.bottom);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

            // Wave lines
            const alpha = 0.05 + (this.phaseIndex * 0.03);
            ctx.strokeStyle = `rgba(0, 100, 180, ${alpha})`;
            ctx.lineWidth = 1;
            for (let y = 0; y < CANVAS_H + 40; y += 30) {
                const drawY = (y + this.scrollY * 0.5) % (CANVAS_H + 40) - 20;
                ctx.beginPath();
                for (let x = 0; x < CANVAS_W; x += 5) {
                    const wave = Math.sin((x + this.scrollY) * 0.02) * 3;
                    if (x === 0) ctx.moveTo(x, drawY + wave);
                    else ctx.lineTo(x, drawY + wave);
                }
                ctx.stroke();
            }

            // Islands
            for (const island of this.islands) {
                let drawY = ((island.y + this.scrollY * 0.8) % (CANVAS_H * 3)) ;
                if (drawY > CANVAS_H + island.radius) continue;
                if (drawY < -island.radius) continue;

                ctx.fillStyle = island.color;
                ctx.beginPath();
                ctx.ellipse(island.x, drawY, island.radius, island.radius * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();

                // Island detail
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.beginPath();
                ctx.ellipse(island.x + 3, drawY + 3, island.radius * 0.7, island.radius * 0.4, 0, 0, Math.PI * 2);
                ctx.fill();

                // Beach ring
                ctx.strokeStyle = 'rgba(194, 178, 128, 0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.ellipse(island.x, drawY, island.radius + 2, island.radius * 0.6 + 1, 0, 0, Math.PI * 2);
                ctx.stroke();
            }
        }
    }

    // ============================================================
    //  PARTICLE SYSTEM
    // ============================================================
    class Particle {
        constructor(x, y, color, speed, life, size) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.vx = (Math.random() - 0.5) * speed;
            this.vy = (Math.random() - 0.5) * speed;
            this.life = life;
            this.maxLife = life;
            this.size = size;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.05; // gravity
            this.life--;
        }

        draw(ctx) {
            const alpha = this.life / this.maxLife;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
            ctx.globalAlpha = 1;
        }

        isDead() {
            return this.life <= 0;
        }
    }

    // ============================================================
    //  POWER-UP
    // ============================================================
    class PowerUp {
        constructor(x, y, type) {
            this.x = x;
            this.y = y;
            this.type = type; // 'spread', 'laser', 'missile', 'double', 'life'
            this.width = 20;
            this.height = 20;
            this.speed = 1.5;
            this.time = 0;
            this.alive = true;
            this.color = POWERUP_COLORS[type] || '#fff';
        }

        update() {
            this.time++;
            this.y += this.speed;
            if (this.y > CANVAS_H + 30) {
                this.alive = false;
            }
        }

        draw(ctx) {
            const pulse = 1 + Math.sin(this.time * 0.15) * 0.15;
            const s = this.width * pulse / 2;

            ctx.save();
            ctx.translate(this.x, this.y);

            // Glow
            ctx.shadowColor = this.color;
            ctx.shadowBlur = 10;

            // Outer ring
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, s, 0, Math.PI * 2);
            ctx.stroke();

            // Inner filled circle
            ctx.fillStyle = this.color;
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            ctx.arc(0, 0, s, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;

            // Icon
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px Courier New';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            let label;
            switch (this.type) {
                case 'spread': label = 'S'; break;
                case 'laser': label = 'L'; break;
                case 'missile': label = 'M'; break;
                case 'double': label = 'D'; break;
                case 'life': label = '+'; break;
                default: label = '?';
            }
            ctx.fillText(label, 0, 1);

            ctx.shadowBlur = 0;
            ctx.restore();
        }

        getHitbox() {
            return {
                x: this.x - this.width / 2,
                y: this.y - this.height / 2,
                w: this.width,
                h: this.height
            };
        }
    }

    // ============================================================
    //  PLAYER
    // ============================================================
    class Player {
        constructor() {
            this.reset();
        }

        reset() {
            this.x = CANVAS_W / 2;
            this.y = CANVAS_H - 80;
            this.width = PLAYER_WIDTH;
            this.height = PLAYER_HEIGHT;
            this.lives = PLAYER_LIVES;
            this.loopCharges = PLAYER_LOOP_COUNT;
            this.isLooping = false;
            this.loopTimer = 0;
            this.shootCooldown = 0;
            this.invincible = false;
            this.invincibleTimer = 0;
            this.alive = true;
            this.bullets = [];
            this.scaleX = 1;
            this.scaleY = 1;
            this.tilt = 0;
            this.weaponLevel = 0; // 0=normal, 1=spread, 2=laser, 3=missile, 4=double
            this.weaponTimer = 0;
            this.weaponDuration = 600; // weapon lasts 10 seconds (600 frames)
            this.weaponFlash = 0;
            this.loopRegenTimer = 0; // frames since last loop charge regen
        }

        update() {
            if (!this.alive) return;

            // Movement
            let dx = 0;
            let dy = 0;
            if (input.isDown('ArrowLeft') || input.isDown('KeyA')) dx -= PLAYER_SPEED;
            if (input.isDown('ArrowRight') || input.isDown('KeyD')) dx += PLAYER_SPEED;
            if (input.isDown('ArrowUp') || input.isDown('KeyW')) dy -= PLAYER_SPEED;
            if (input.isDown('ArrowDown') || input.isDown('KeyS')) dy += PLAYER_SPEED;

            this.x += dx;
            this.y += dy;

            // Constrain to canvas
            this.x = Math.max(this.width / 2, Math.min(CANVAS_W - this.width / 2, this.x));
            this.y = Math.max(this.height / 2, Math.min(CANVAS_H - this.height / 2, this.y));

            // Tilt based on horizontal movement
            this.tilt += (dx * 0.05 - this.tilt) * 0.2;

            // Shooting
            if (this.shootCooldown > 0) this.shootCooldown--;
            if (input.isDown('Space') && this.shootCooldown <= 0 && !this.isLooping) {
                this.shoot();
                this.shootCooldown = PLAYER_SHOOT_COOLDOWN;
            }

            // Loop-de-loop
            if (input.wasPressed('KeyB') || input.wasPressed('KeyX')) {
                if (this.loopCharges > 0 && !this.isLooping) {
                    this.startLoop();
                }
            }

            // Regenerate loop charges over time (1 charge per 600 frames = 10s)
            if (this.loopCharges < PLAYER_LOOP_COUNT && !this.isLooping) {
                this.loopRegenTimer++;
                if (this.loopRegenTimer >= 600) {
                    this.loopRegenTimer = 0;
                    this.loopCharges++;
                }
            } else {
                this.loopRegenTimer = 0;
            }

            // Loop animation
            if (this.isLooping) {
                this.loopTimer++;
                const progress = this.loopTimer / PLAYER_LOOP_DURATION;
                // Scale up then down to simulate altitude change
                this.scaleX = 1 + Math.sin(progress * Math.PI) * 0.8;
                this.scaleY = 1 + Math.sin(progress * Math.PI) * 0.5;

                if (this.loopTimer >= PLAYER_LOOP_DURATION) {
                    this.isLooping = false;
                    this.loopTimer = 0;
                    this.scaleX = 1;
                    this.scaleY = 1;
                }
            } else {
                this.scaleX += (1 - this.scaleX) * 0.2;
                this.scaleY += (1 - this.scaleY) * 0.2;
            }

            // Invincibility after hit
            if (this.invincible) {
                this.invincibleTimer--;
                if (this.invincibleTimer <= 0) {
                    this.invincible = false;
                }
            }

            // Weapon timer
            if (this.weaponLevel > 0) {
                this.weaponTimer--;
                if (this.weaponTimer <= 0) {
                    this.weaponLevel = 0;
                }
            }
            if (this.weaponFlash > 0) this.weaponFlash--;

            // Update bullets
            this.bullets = this.bullets.filter(b => {
                b.update();
                return b.y > -20 && b.y < CANVAS_H + 20;
            });
        }

        shoot() {
            const w = this.weaponLevel;

            if (w === WEAPON_NORMAL) {
                // Normal dual shot
                this.bullets.push(this.createNormalBullet(this.x - 8));
                this.bullets.push(this.createNormalBullet(this.x + 8));
            } else if (w === WEAPON_SPREAD) {
                // 5-way spread shot
                this.bullets.push(this.createNormalBullet(this.x));
                this.bullets.push(this.createSpreadBullet(this.x - 4, -0.2));
                this.bullets.push(this.createSpreadBullet(this.x + 4, 0.2));
                this.bullets.push(this.createSpreadBullet(this.x - 10, -0.4));
                this.bullets.push(this.createSpreadBullet(this.x + 10, 0.4));
            } else if (w === WEAPON_LASER) {
                // Single piercing laser beam
                this.bullets.push({
                    x: this.x,
                    y: this.y - this.height / 2,
                    width: 6,
                    height: 40,
                    piercing: true,
                    hits: 0,
                    maxHits: 3,
                    update() {
                        this.y -= BULLET_SPEED * 2.5;
                    },
                    draw(ctx) {
                        ctx.fillStyle = '#0ff';
                        ctx.shadowColor = '#0ff';
                        ctx.shadowBlur = 8;
                        ctx.fillRect(this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = '#fff';
                        ctx.fillRect(this.x - 1, this.y - this.height / 2, 2, this.height);
                    }
                });
            } else if (w === WEAPON_MISSILE) {
                // 2 homing missiles
                this.bullets.push(this.createMissile(this.x - 12));
                this.bullets.push(this.createMissile(this.x + 12));
            } else if (w === WEAPON_DOUBLE) {
                // Wide dual shot with 2 angles
                this.bullets.push(this.createNormalBullet(this.x - 16));
                this.bullets.push(this.createNormalBullet(this.x + 16));
                this.bullets.push(this.createSpreadBullet(this.x - 12, -0.15));
                this.bullets.push(this.createSpreadBullet(this.x + 12, 0.15));
            }

            audio.play('shoot');
        }

        createNormalBullet(xOffset) {
            return {
                x: xOffset,
                y: this.y - this.height / 2,
                width: BULLET_WIDTH,
                height: BULLET_HEIGHT,
                vx: 0,
                update() {
                    this.x += this.vx;
                    this.y -= BULLET_SPEED;
                },
                draw(ctx) {
                    ctx.fillStyle = '#ff0';
                    ctx.fillRect(this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(this.x - 1, this.y - this.height / 2, 2, this.height);
                }
            };
        }

        createSpreadBullet(xOffset, angle) {
            return {
                x: xOffset,
                y: this.y - this.height / 2,
                width: BULLET_WIDTH,
                height: BULLET_HEIGHT,
                vx: Math.sin(angle) * BULLET_SPEED,
                update() {
                    this.x += this.vx;
                    this.y -= BULLET_SPEED * Math.cos(angle);
                },
                draw(ctx) {
                    ctx.fillStyle = '#f80';
                    ctx.fillRect(this.x - this.width / 2, this.y - this.height / 2, this.width, this.height);
                    ctx.fillStyle = '#ff0';
                    ctx.fillRect(this.x - 1, this.y - this.height / 2, 2, this.height);
                }
            };
        }

        createMissile(xOffset) {
            return {
                x: xOffset,
                y: this.y - this.height / 2,
                width: 6,
                height: 10,
                vx: 0,
                vy: -BULLET_SPEED * 0.7,
                target: null,
                turnRate: 0.15,
                speed: BULLET_SPEED * 0.9,
                update() {
                    // Find nearest enemy if no target or target dead
                    if (!this.target || !this.target.alive) {
                        let nearest = null;
                        let nearestDist = Infinity;
                        for (const e of game.enemies) {
                            if (!e.alive) continue;
                            const dx = e.x - this.x;
                            const dy = e.y - this.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < nearestDist) {
                                nearestDist = dist;
                                nearest = e;
                            }
                        }
                        this.target = nearest;
                    }
                    // Steer toward target
                    if (this.target) {
                        const dx = this.target.x - this.x;
                        const dy = this.target.y - this.y;
                        const desiredAngle = Math.atan2(dy, dx);
                        const currentAngle = Math.atan2(this.vy, this.vx);
                        let diff = desiredAngle - currentAngle;
                        while (diff > Math.PI) diff -= Math.PI * 2;
                        while (diff < -Math.PI) diff += Math.PI * 2;
                        const steer = Math.max(-this.turnRate, Math.min(this.turnRate, diff));
                        const newAngle = currentAngle + steer;
                        this.vx = Math.cos(newAngle) * this.speed;
                        this.vy = Math.sin(newAngle) * this.speed;
                    }
                    this.x += this.vx;
                    this.y += this.vy;
                },
                draw(ctx) {
                    ctx.fillStyle = '#f0f';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                    // Trail
                    ctx.fillStyle = 'rgba(255, 0, 255, 0.3)';
                    ctx.beginPath();
                    ctx.arc(this.x - this.vx, this.y - this.vy, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            };
        }

        startLoop() {
            this.isLooping = true;
            this.loopTimer = 0;
            this.loopCharges--;
            audio.play('loop');
        }

        hit() {
            if (this.isLooping || this.invincible || !this.alive) return false;
            this.lives--;
            this.invincible = true;
            this.invincibleTimer = 120; // 2 seconds of invincibility
            if (this.lives <= 0) {
                this.alive = false;
            }
            return true;
        }

        draw(ctx) {
            if (!this.alive) return;

            // Blink when invincible
            if (this.invincible && Math.floor(this.invincibleTimer / 4) % 2 === 0) return;

            // Weapon pickup flash
            if (this.weaponFlash > 0) {
                ctx.globalAlpha = 0.5 + Math.sin(this.weaponFlash * 0.5) * 0.5;
            }

            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.scale(this.scaleX, this.scaleY);
            ctx.rotate(this.tilt);

            // P-38 Lightning - twin boom design
            const w = this.width;
            const h = this.height;

            // Left boom
            ctx.fillStyle = '#2d5a1e';
            ctx.beginPath();
            ctx.moveTo(-w * 0.35, h * 0.3);
            ctx.lineTo(-w * 0.45, h * 0.5);
            ctx.lineTo(-w * 0.2, h * 0.5);
            ctx.lineTo(-w * 0.15, h * 0.3);
            ctx.closePath();
            ctx.fill();

            // Right boom
            ctx.beginPath();
            ctx.moveTo(w * 0.35, h * 0.3);
            ctx.lineTo(w * 0.45, h * 0.5);
            ctx.lineTo(w * 0.2, h * 0.5);
            ctx.lineTo(w * 0.15, h * 0.3);
            ctx.closePath();
            ctx.fill();

            // Center fuselage
            ctx.fillStyle = '#3a7a28';
            ctx.beginPath();
            ctx.moveTo(0, -h * 0.5); // nose
            ctx.lineTo(-w * 0.15, -h * 0.1);
            ctx.lineTo(-w * 0.15, h * 0.3);
            ctx.lineTo(w * 0.15, h * 0.3);
            ctx.lineTo(w * 0.15, -h * 0.1);
            ctx.closePath();
            ctx.fill();

            // Cockpit
            ctx.fillStyle = '#88ccff';
            ctx.beginPath();
            ctx.ellipse(0, -h * 0.2, 4, 7, 0, 0, Math.PI * 2);
            ctx.fill();

            // Main wings
            ctx.fillStyle = '#2d5a1e';
            ctx.beginPath();
            ctx.moveTo(-w * 0.5, 0);
            ctx.lineTo(-w * 0.15, -h * 0.05);
            ctx.lineTo(-w * 0.15, h * 0.05);
            ctx.lineTo(-w * 0.45, h * 0.05);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(w * 0.5, 0);
            ctx.lineTo(w * 0.15, -h * 0.05);
            ctx.lineTo(w * 0.15, h * 0.05);
            ctx.lineTo(w * 0.45, h * 0.05);
            ctx.closePath();
            ctx.fill();

            // Wing details
            ctx.strokeStyle = '#1a3d10';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(-w * 0.4, 0);
            ctx.lineTo(-w * 0.2, 0);
            ctx.moveTo(w * 0.4, 0);
            ctx.lineTo(w * 0.2, 0);
            ctx.stroke();

            // Tail fins
            ctx.fillStyle = '#2d5a1e';
            ctx.beginPath();
            ctx.moveTo(-w * 0.2, h * 0.3);
            ctx.lineTo(-w * 0.35, h * 0.5);
            ctx.lineTo(-w * 0.1, h * 0.45);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(w * 0.2, h * 0.3);
            ctx.lineTo(w * 0.35, h * 0.5);
            ctx.lineTo(w * 0.1, h * 0.45);
            ctx.closePath();
            ctx.fill();

            // Engine glow
            if (!this.isLooping) {
                const flicker = game ? (Math.sin(game.frameCount * 0.3) * 0.5 + 0.5) : 0.5;
                ctx.fillStyle = `rgba(255, ${150 + flicker * 100}, 0, ${0.5 + flicker * 0.5})`;
                const engineSize = 4 + flicker * 3;
                ctx.beginPath();
                ctx.ellipse(-w * 0.3, h * 0.55, 3, engineSize, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(w * 0.3, h * 0.55, 3, engineSize, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            // Weapon glow on wingtips
            if (this.weaponLevel > 0) {
                const weaponColors = ['', '#f80', '#0ff', '#f0f', '#ff0'];
                const wColor = weaponColors[this.weaponLevel] || '#fff';
                const pulse = 0.4 + Math.sin(game.frameCount * 0.2) * 0.2;
                ctx.shadowColor = wColor;
                ctx.shadowBlur = 8;
                ctx.fillStyle = wColor;
                ctx.globalAlpha = pulse;
                ctx.beginPath();
                ctx.arc(-w * 0.45, 2, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(w * 0.45, 2, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }

            // Star insignia
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(0, h * 0.1, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            if (this.weaponFlash > 0) {
                ctx.globalAlpha = 1;
            }
        }

        getHitbox() {
            return {
                x: this.x - this.width / 3,
                y: this.y - this.height / 3,
                w: this.width * 0.66,
                h: this.height * 0.66
            };
        }
    }

    // ============================================================
    //  ENEMY PLANES
    // ============================================================
    class EnemyFighter {
        constructor(x, y, pattern) {
            this.x = x;
            this.y = y;
            this.startX = x;
            this.width = ENEMY_FIGHTER_SIZE;
            this.height = ENEMY_FIGHTER_SIZE;
            this.hp = ENEMY_FIGHTER_HP;
            this.maxHp = ENEMY_FIGHTER_HP;
            this.speed = ENEMY_FIGHTER_SPEED;
            this.score = ENEMY_FIGHTER_SCORE;
            this.pattern = pattern; // 'straight', 'sine', 'loop'
            this.time = 0;
            this.amplitude = 60 + Math.random() * 40;
            this.frequency = 0.02 + Math.random() * 0.02;
            this.bullets = [];
            this.shootTimer = 60 + Math.floor(Math.random() * 60);
            this.alive = true;
        }

        update() {
            this.time++;
            this.y += this.speed;

            switch (this.pattern) {
                case 'sine':
                    this.x = this.startX + Math.sin(this.time * this.frequency) * this.amplitude;
                    break;
                case 'loop':
                    this.x = this.startX + Math.sin(this.time * this.frequency * 0.5) * this.amplitude * 1.5;
                    this.y += Math.sin(this.time * 0.03) * 0.5;
                    break;
                case 'straight':
                default:
                    break;
            }

            // Shooting
            this.shootTimer--;
            if (this.shootTimer <= 0 && this.y > 0 && this.y < CANVAS_H - 100) {
                this.shoot();
                this.shootTimer = 80 + Math.floor(Math.random() * 40);
            }

            // Update bullets
            this.bullets = this.bullets.filter(b => {
                b.update();
                return b.y > -20 && b.y < CANVAS_H + 20 && b.x > -20 && b.x < CANVAS_W + 20;
            });

            // Remove if off screen
            if (this.y > CANVAS_H + 50) {
                this.alive = false;
            }
        }

        shoot() {
            this.bullets.push({
                x: this.x,
                y: this.y + this.height / 2,
                vx: 0,
                vy: ENEMY_BULLET_SPEED,
                size: ENEMY_BULLET_SIZE,
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                },
                draw(ctx) {
                    ctx.fillStyle = '#f44';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        hit() {
            this.hp--;
            if (this.hp <= 0) {
                this.alive = false;
                return true;
            }
            return false;
        }

        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);

            const s = this.width;

            // Enemy fighter - gray Zero-style
            // Fuselage
            ctx.fillStyle = '#666';
            ctx.beginPath();
            ctx.moveTo(0, -s * 0.5);
            ctx.lineTo(-s * 0.12, 0);
            ctx.lineTo(-s * 0.1, s * 0.4);
            ctx.lineTo(s * 0.1, s * 0.4);
            ctx.lineTo(s * 0.12, 0);
            ctx.closePath();
            ctx.fill();

            // Wings
            ctx.fillStyle = '#555';
            ctx.beginPath();
            ctx.moveTo(-s * 0.5, -s * 0.05);
            ctx.lineTo(-s * 0.12, -s * 0.1);
            ctx.lineTo(-s * 0.12, s * 0.05);
            ctx.lineTo(-s * 0.4, s * 0.1);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(s * 0.5, -s * 0.05);
            ctx.lineTo(s * 0.12, -s * 0.1);
            ctx.lineTo(s * 0.12, s * 0.05);
            ctx.lineTo(s * 0.4, s * 0.1);
            ctx.closePath();
            ctx.fill();

            // Red circle (rising sun)
            ctx.fillStyle = '#c00';
            ctx.beginPath();
            ctx.arc(0, 0, s * 0.12, 0, Math.PI * 2);
            ctx.fill();

            // Tail
            ctx.fillStyle = '#444';
            ctx.beginPath();
            ctx.moveTo(-s * 0.2, s * 0.35);
            ctx.lineTo(0, s * 0.5);
            ctx.lineTo(s * 0.2, s * 0.35);
            ctx.closePath();
            ctx.fill();

            // Damage indicator
            if (this.hp < this.maxHp) {
                ctx.strokeStyle = '#f00';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(-s * 0.1, -s * 0.2);
                ctx.lineTo(s * 0.1, s * 0.1);
                ctx.moveTo(s * 0.1, -s * 0.2);
                ctx.lineTo(-s * 0.1, s * 0.1);
                ctx.stroke();
            }

            ctx.restore();

            // Draw bullets
            for (const b of this.bullets) {
                b.draw(ctx);
            }
        }

        getHitbox() {
            return {
                x: this.x - this.width / 2.5,
                y: this.y - this.height / 2.5,
                w: this.width * 0.8,
                h: this.height * 0.8
            };
        }
    }

    class EnemyBomber {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.startX = x;
            this.width = ENEMY_BOMBER_SIZE;
            this.height = ENEMY_BOMBER_SIZE * 1.2;
            this.hp = ENEMY_BOMBER_HP;
            this.maxHp = ENEMY_BOMBER_HP;
            this.speed = ENEMY_BOMBER_SPEED;
            this.score = ENEMY_BOMBER_SCORE;
            this.time = 0;
            this.bullets = [];
            this.shootTimer = 40;
            this.alive = true;
        }

        update() {
            this.time++;
            this.y += this.speed;

            // Gentle sine wave
            this.x = this.startX + Math.sin(this.time * 0.01) * 30;

            // Spread shooting
            this.shootTimer--;
            if (this.shootTimer <= 0 && this.y > 0 && this.y < CANVAS_H - 150) {
                this.shootSpread();
                this.shootTimer = 50;
            }

            // Update bullets
            this.bullets = this.bullets.filter(b => {
                b.update();
                return b.y > -20 && b.y < CANVAS_H + 20 && b.x > -20 && b.x < CANVAS_W + 20;
            });

            if (this.y > CANVAS_H + 60) {
                this.alive = false;
            }
        }

        shootSpread() {
            const angles = [-0.3, -0.15, 0, 0.15, 0.3];
            for (const angle of angles) {
                this.bullets.push({
                    x: this.x,
                    y: this.y + this.height / 2,
                    vx: Math.sin(angle) * ENEMY_BULLET_SPEED,
                    vy: Math.cos(angle) * ENEMY_BULLET_SPEED,
                    size: ENEMY_BULLET_SIZE + 1,
                    update() {
                        this.x += this.vx;
                        this.y += this.vy;
                    },
                    draw(ctx) {
                        ctx.fillStyle = '#f80';
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#ff0';
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size / 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
            }
        }

        hit() {
            this.hp--;
            if (this.hp <= 0) {
                this.alive = false;
                return true;
            }
            return false;
        }

        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);

            const s = this.width;

            // Bomber body - larger, darker
            ctx.fillStyle = '#3a3a3a';
            ctx.beginPath();
            ctx.moveTo(0, -s * 0.6);
            ctx.lineTo(-s * 0.2, -s * 0.2);
            ctx.lineTo(-s * 0.15, s * 0.5);
            ctx.lineTo(s * 0.15, s * 0.5);
            ctx.lineTo(s * 0.2, -s * 0.2);
            ctx.closePath();
            ctx.fill();

            // Long wings
            ctx.fillStyle = '#4a4a4a';
            ctx.beginPath();
            ctx.moveTo(-s * 0.7, -s * 0.1);
            ctx.lineTo(-s * 0.2, -s * 0.2);
            ctx.lineTo(-s * 0.2, s * 0.05);
            ctx.lineTo(-s * 0.6, s * 0.15);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(s * 0.7, -s * 0.1);
            ctx.lineTo(s * 0.2, -s * 0.2);
            ctx.lineTo(s * 0.2, s * 0.05);
            ctx.lineTo(s * 0.6, s * 0.15);
            ctx.closePath();
            ctx.fill();

            // Twin tails
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.moveTo(-s * 0.3, s * 0.4);
            ctx.lineTo(-s * 0.4, s * 0.6);
            ctx.lineTo(-s * 0.15, s * 0.5);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(s * 0.3, s * 0.4);
            ctx.lineTo(s * 0.4, s * 0.6);
            ctx.lineTo(s * 0.15, s * 0.5);
            ctx.closePath();
            ctx.fill();

            // Nose
            ctx.fillStyle = '#555';
            ctx.beginPath();
            ctx.arc(0, -s * 0.5, s * 0.1, 0, Math.PI * 2);
            ctx.fill();

            // HP bar
            const hpRatio = this.hp / this.maxHp;
            ctx.fillStyle = '#300';
            ctx.fillRect(-s * 0.3, -s * 0.7, s * 0.6, 4);
            ctx.fillStyle = hpRatio > 0.5 ? '#0f0' : hpRatio > 0.25 ? '#ff0' : '#f00';
            ctx.fillRect(-s * 0.3, -s * 0.7, s * 0.6 * hpRatio, 4);

            ctx.restore();

            for (const b of this.bullets) {
                b.draw(ctx);
            }
        }

        getHitbox() {
            return {
                x: this.x - this.width / 2.5,
                y: this.y - this.height / 2.5,
                w: this.width * 0.8,
                h: this.height * 0.8
            };
        }
    }
